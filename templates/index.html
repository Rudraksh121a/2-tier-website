<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-purple-100 to-blue-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-2xl">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">✨ My Todo List</h1>
            <p class="text-gray-600">Stay organized and productive</p>
        </div>

        <!-- Add Todo Form -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <form id="todo-form" class="flex gap-2">
                <input 
                    type="text" 
                    id="todo-input" 
                    placeholder="What needs to be done?" 
                    class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                    required
                >
                <button 
                    type="submit" 
                    class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-lg font-semibold transition duration-200 shadow-md hover:shadow-lg"
                >
                    Add
                </button>
            </form>
        </div>

        <!-- Stats -->
        <div class="bg-white rounded-lg shadow-lg p-4 mb-6">
            <div class="flex justify-around text-center">
                <div>
                    <p class="text-2xl font-bold text-purple-600" id="total-count">0</p>
                    <p class="text-gray-600 text-sm">Total</p>
                </div>
                <div>
                    <p class="text-2xl font-bold text-green-600" id="completed-count">0</p>
                    <p class="text-gray-600 text-sm">Completed</p>
                </div>
                <div>
                    <p class="text-2xl font-bold text-orange-600" id="pending-count">0</p>
                    <p class="text-gray-600 text-sm">Pending</p>
                </div>
            </div>
        </div>

        <!-- Filter Buttons -->
        <div class="flex gap-2 mb-6 justify-center">
            <button 
                onclick="filterTodos('all')" 
                id="filter-all"
                class="px-4 py-2 rounded-lg font-medium transition duration-200 bg-purple-600 text-white"
            >
                All
            </button>
            <button 
                onclick="filterTodos('active')" 
                id="filter-active"
                class="px-4 py-2 rounded-lg font-medium transition duration-200 bg-gray-200 text-gray-700 hover:bg-gray-300"
            >
                Active
            </button>
            <button 
                onclick="filterTodos('completed')" 
                id="filter-completed"
                class="px-4 py-2 rounded-lg font-medium transition duration-200 bg-gray-200 text-gray-700 hover:bg-gray-300"
            >
                Completed
            </button>
        </div>

        <!-- Todo List -->
        <div id="todo-list" class="space-y-3">
            <!-- Todos will be inserted here -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="text-center py-12 hidden">
            <p class="text-gray-400 text-lg">No todos yet. Add one above!</p>
        </div>
    </div>

    <script>
        let todos = [];
        let currentFilter = 'all';

        // Load todos on page load
        document.addEventListener('DOMContentLoaded', loadTodos);

        // Add todo form submit
        document.getElementById('todo-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('todo-input');
            const title = input.value.trim();

            if (!title) return;

            try {
                const response = await fetch('/api/todos', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ title }),
                });

                if (response.ok) {
                    input.value = '';
                    loadTodos();
                }
            } catch (error) {
                console.error('Error adding todo:', error);
            }
        });

        // Load all todos
        async function loadTodos() {
            try {
                const response = await fetch('/api/todos');
                todos = await response.json();
                updateStats();
                renderTodos();
            } catch (error) {
                console.error('Error loading todos:', error);
            }
        }

        // Render todos based on current filter
        function renderTodos() {
            const todoList = document.getElementById('todo-list');
            const emptyState = document.getElementById('empty-state');
            
            let filteredTodos = todos;
            if (currentFilter === 'active') {
                filteredTodos = todos.filter(todo => !todo.completed);
            } else if (currentFilter === 'completed') {
                filteredTodos = todos.filter(todo => todo.completed);
            }

            if (filteredTodos.length === 0) {
                todoList.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            todoList.innerHTML = filteredTodos.map(todo => `
                <div class="bg-white rounded-lg shadow-md p-4 flex items-center gap-3 hover:shadow-lg transition duration-200 ${todo.completed ? 'opacity-75' : ''}">
                    <input 
                        type="checkbox" 
                        ${todo.completed ? 'checked' : ''} 
                        onchange="toggleTodo(${todo.id}, this.checked)"
                        class="w-5 h-5 text-purple-600 rounded focus:ring-2 focus:ring-purple-500 cursor-pointer"
                    >
                    <span class="flex-1 ${todo.completed ? 'line-through text-gray-500' : 'text-gray-800'}">
                        ${escapeHtml(todo.title)}
                    </span>
                    <button 
                        onclick="deleteTodo(${todo.id})"
                        class="text-red-500 hover:text-red-700 hover:bg-red-50 p-2 rounded-lg transition duration-200"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                        </svg>
                    </button>
                </div>
            `).join('');
        }

        // Toggle todo completion
        async function toggleTodo(id, completed) {
            try {
                await fetch(`/api/todos/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ completed }),
                });
                loadTodos();
            } catch (error) {
                console.error('Error toggling todo:', error);
            }
        }

        // Delete todo
        async function deleteTodo(id) {
            if (!confirm('Are you sure you want to delete this todo?')) return;

            try {
                await fetch(`/api/todos/${id}`, {
                    method: 'DELETE',
                });
                loadTodos();
            } catch (error) {
                console.error('Error deleting todo:', error);
            }
        }

        // Filter todos
        function filterTodos(filter) {
            currentFilter = filter;
            
            // Update button styles
            document.querySelectorAll('[id^="filter-"]').forEach(btn => {
                btn.className = 'px-4 py-2 rounded-lg font-medium transition duration-200 bg-gray-200 text-gray-700 hover:bg-gray-300';
            });
            document.getElementById(`filter-${filter}`).className = 'px-4 py-2 rounded-lg font-medium transition duration-200 bg-purple-600 text-white';
            
            renderTodos();
        }

        // Update stats
        function updateStats() {
            const total = todos.length;
            const completed = todos.filter(todo => todo.completed).length;
            const pending = total - completed;

            document.getElementById('total-count').textContent = total;
            document.getElementById('completed-count').textContent = completed;
            document.getElementById('pending-count').textContent = pending;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
